<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160">
  <rect width="240" height="160" rx="12" fill="#161b22"/>
  <!-- Chair -->
  <rect x="35" y="92" width="40" height="5" rx="2" fill="#484f58">
    <animate attributeName="opacity" values="0.8;0.8;0.2;0.2" dur="4s" repeatCount="indefinite"/>
  </rect>
  <rect x="33" y="68" width="5" height="57" rx="2" fill="#484f58">
    <animate attributeName="opacity" values="0.8;0.8;0.2;0.2" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- Person — body rises, moves right -->
  <rect x="48" y="88" width="25" height="32" rx="4" fill="#30363d">
    <animate attributeName="x" values="48;48;100;100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="88;88;72;72" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- Neck -->
  <rect x="54" y="66" width="13" height="26" rx="3" fill="#484f58">
    <animate attributeName="x" values="54;54;106;106" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="66;66;50;50" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- Head -->
  <circle cx="61" cy="50" r="16" fill="#484f58">
    <animate attributeName="cx" values="61;61;113;113" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="50;50;34;34" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- Eyes -->
  <circle cx="57" cy="47" r="1.5" fill="#e6edf3">
    <animate attributeName="cx" values="57;57;109;109" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="47;47;31;31" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="65" cy="47" r="1.5" fill="#e6edf3">
    <animate attributeName="cx" values="65;65;117;117" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="47;47;31;31" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- Arrow — slides right -->
  <text x="95" y="78" fill="#58a6ff" font-family="sans-serif" font-size="26" text-anchor="middle">→
    <animate attributeName="opacity" values="0;0;1;1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="85;85;145;145" dur="4s" repeatCount="indefinite"/>
  </text>
  <!-- Walking footsteps appear -->
  <text x="150" y="140" fill="#3fb950" font-family="sans-serif" font-size="14">👣
    <animate attributeName="opacity" values="0;0;0;1" dur="4s" repeatCount="indefinite"/>
  </text>
  <text x="175" y="130" fill="#3fb950" font-family="sans-serif" font-size="14">👣
    <animate attributeName="opacity" values="0;0;0;0.7" dur="4s" repeatCount="indefinite"/>
  </text>
  <!-- Labels -->
  <text x="55" y="148" fill="#f85149" font-family="sans-serif" font-size="9" text-anchor="middle">sitting</text>
  <text x="190" y="148" fill="#3fb950" font-family="sans-serif" font-size="9" text-anchor="middle">moving!</text>
  <rect x="155" y="92" rx="10" ry="10" width="60" height="24" fill="#3fb950" opacity="0.15"/>
  <text x="185" y="108" fill="#3fb950" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle">2-3 min</text>
</svg>
