<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160">
  <rect width="240" height="160" rx="12" fill="#161b22"/>
  <!-- Body -->
  <rect x="95" y="100" width="50" height="50" rx="6" fill="#30363d"/>
  <!-- Neck -->
  <rect x="110" y="68" width="20" height="38" rx="4" fill="#484f58"/>
  <!-- Head — tilts via cx/cy moving side to side -->
  <circle cx="120" cy="48" r="24" fill="#484f58">
    <animate attributeName="cx" values="120;135;135;120;105;105;120" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="48;52;52;48;52;52;48" dur="5s" repeatCount="indefinite"/>
  </circle>
  <!-- Eyes follow head -->
  <circle cx="112" cy="44" r="2.5" fill="#e6edf3">
    <animate attributeName="cx" values="112;127;127;112;97;97;112" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="128" cy="44" r="2.5" fill="#e6edf3">
    <animate attributeName="cx" values="128;143;143;128;113;113;128" dur="5s" repeatCount="indefinite"/>
  </circle>
  <!-- Stretch glow — left side -->
  <ellipse cx="85" cy="58" rx="14" ry="22" fill="#f0883e" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;0.4;0.4;0" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Stretch glow — right side -->
  <ellipse cx="155" cy="58" rx="14" ry="22" fill="#f0883e" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0.4;0;0;0;0" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Side labels -->
  <text x="42" y="62" fill="#8b949e" font-family="sans-serif" font-size="10" text-anchor="middle">← tilt</text>
  <text x="198" y="62" fill="#8b949e" font-family="sans-serif" font-size="10" text-anchor="middle">tilt →</text>
  <!-- Hold label -->
  <rect x="80" y="130" rx="10" ry="10" width="80" height="24" fill="#3fb950" opacity="0.15"/>
  <text x="120" y="146" fill="#3fb950" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle">hold 15-30s</text>
</svg>
