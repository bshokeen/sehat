<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 110" width="380" height="110">
  <rect width="380" height="110" rx="8" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="190" y="16" fill="#f9e2af" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle">🤲 Suboccipital Release — Back of Head</text>

  <!-- Person from behind (back of head) — centered -->
  <g transform="translate(140,58)">
    <!-- Shoulders -->
    <rect x="-35" y="18" width="70" height="16" rx="5" fill="#313244"/>
    <!-- Neck -->
    <rect x="-10" y="2" width="20" height="20" rx="4" fill="#45475a"/>
    <!-- Back of head -->
    <circle cx="0" cy="-14" r="18" fill="#45475a"/>
    <!-- Hair line hint -->
    <path d="M-16,-22 Q0,-36 16,-22" fill="none" stroke="#313244" stroke-width="2"/>

    <!-- Target zone: skull base — pulsing orange bar -->
    <rect x="-14" y="-1" rx="3" ry="3" width="28" height="6" fill="#f0883e">
      <animate attributeName="opacity" values="0.25;0.8;0.8;0.25;0.25" dur="2.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Left hand pressing skull base -->
  <g transform="translate(140,58)">
    <!-- Arm -->
    <line x1="-35" y1="22" x2="-20" y2="6" stroke="#89b4fa" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Fingertips -->
    <circle cx="-12" cy="1" r="3" fill="#89b4fa">
      <animate attributeName="r" values="2;4;4;2;2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-7" cy="0" r="3" fill="#89b4fa">
      <animate attributeName="r" values="2;4;4;2;2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <line x1="-20" y1="6" x2="-10" y2="2" stroke="#89b4fa" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Right hand pressing skull base -->
  <g transform="translate(140,58)">
    <line x1="35" y1="22" x2="20" y2="6" stroke="#89b4fa" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="12" cy="1" r="3" fill="#89b4fa">
      <animate attributeName="r" values="2;4;4;2;2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="7" cy="0" r="3" fill="#89b4fa">
      <animate attributeName="r" values="2;4;4;2;2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <line x1="20" y1="6" x2="10" y2="2" stroke="#89b4fa" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- "Press here" callout -->
  <g transform="translate(140,58)">
    <line x1="28" y1="1" x2="42" y2="1" stroke="#f0883e" stroke-width="1.5" stroke-linecap="round">
      <animate attributeName="opacity" values="0.4;1;1;0.4;0.4" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <text x="45" y="-3" fill="#f0883e" font-family="sans-serif" font-size="8" font-weight="600">press</text>
    <text x="45" y="6" fill="#f0883e" font-family="sans-serif" font-size="8" font-weight="600">here</text>
  </g>

  <!-- Instructions at bottom -->
  <text x="190" y="92" fill="#8b949e" font-family="sans-serif" font-size="9" text-anchor="middle">Place fingers at skull base → press gently inward → hold 30-60s</text>
</svg>