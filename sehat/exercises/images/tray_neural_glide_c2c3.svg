<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 110" width="380" height="110">
  <rect width="380" height="110" rx="8" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="190" y="16" fill="#f9e2af" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle">🔮 Neural Glide — Right C2-C3</text>

  <!-- STEP 1 (left): Tilt head right -->
  <g transform="translate(95,60)">
    <!-- Shoulders -->
    <line x1="-25" y1="22" x2="25" y2="22" stroke="#a6adc8" stroke-width="3"/>
    <!-- Spine -->
    <line x1="0" y1="22" x2="0" y2="-5" stroke="#a6adc8" stroke-width="3"/>
    <!-- Head tilting right -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0 0 -10;-22 0 -10;-22 0 -10;0 0 -10;0 0 -10" dur="3s" repeatCount="indefinite"/>
      <circle cx="0" cy="-18" r="13" fill="#cdd6f4" stroke="#a6adc8" stroke-width="1.5"/>
    </g>
    <!-- Curved arrow showing tilt -->
    <g>
      <animate attributeName="opacity" values="0.3;1;1;0.3;0.3" dur="3s" repeatCount="indefinite"/>
      <path d="M16,-28 Q28,-18 22,-6" fill="none" stroke="#bc8cff" stroke-width="2" stroke-linecap="round"/>
      <polygon points="20,-4 26,-4 22,2" fill="#bc8cff"/>
    </g>
    <!-- Label -->
    <text x="0" y="42" fill="#8b949e" font-family="sans-serif" font-size="9" text-anchor="middle">① tilt head right</text>
  </g>

  <!-- Divider -->
  <line x1="190" y1="22" x2="190" y2="90" stroke="#313244" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- STEP 2 (right): Extend arm + spread fingers -->
  <g transform="translate(285,60)">
    <!-- Shoulders -->
    <line x1="-25" y1="22" x2="25" y2="22" stroke="#a6adc8" stroke-width="3"/>
    <!-- Spine -->
    <line x1="0" y1="22" x2="0" y2="-5" stroke="#a6adc8" stroke-width="3"/>
    <!-- Head already tilted (static) -->
    <g transform="rotate(-20 0 -10)">
      <circle cx="0" cy="-18" r="13" fill="#cdd6f4" stroke="#a6adc8" stroke-width="1.5"/>
    </g>
    <!-- Right arm extends out -->
    <line x1="25" y1="18" y2="16" stroke="#89b4fa" stroke-width="3" stroke-linecap="round">
      <animate attributeName="x2" values="32;62;62;32;32" dur="3s" repeatCount="indefinite"/>
    </line>
    <!-- Hand with spread fingers -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;30,0;30,0;0,0;0,0" dur="3s" repeatCount="indefinite"/>
      <circle cx="36" cy="15" r="4" fill="#89b4fa"/>
      <line x1="40" y1="12" x2="46" y2="8" stroke="#89b4fa" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="40" y1="15" x2="47" y2="14" stroke="#89b4fa" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="40" y1="18" x2="46" y2="21" stroke="#89b4fa" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- Arrow -->
    <g>
      <animate attributeName="opacity" values="0.3;1;1;0.3;0.3" dur="3s" repeatCount="indefinite"/>
      <line x1="50" y1="30" x2="70" y2="30" stroke="#f0883e" stroke-width="2" stroke-linecap="round">
        <animate attributeName="x1" values="50;50;50;50;50" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="x2" values="50;75;75;50;50" dur="3s" repeatCount="indefinite"/>
      </line>
      <polygon points="70,26 78,30 70,34" fill="#f0883e">
        <animate attributeName="opacity" values="0;1;1;0;0" dur="3s" repeatCount="indefinite"/>
      </polygon>
    </g>
    <!-- Label -->
    <text x="0" y="42" fill="#8b949e" font-family="sans-serif" font-size="9" text-anchor="middle">② extend arm, spread fingers</text>
  </g>
</svg>