<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 110" width="380" height="110">
  <rect width="380" height="110" rx="8" fill="#1e1e2e"/>
  <text x="190" y="16" fill="#f9e2af" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle">🪑 Posture Check — Straighten Up</text>
  <g transform="translate(150,58)">
    <!-- Bad posture (hunched) fades to good -->
    <g>
      <animate attributeName="opacity" values="1;0;0;1;1" dur="4s" repeatCount="indefinite"/>
      <!-- Chair -->
      <rect x="-15" y="10" width="30" height="3" rx="1" fill="#313244"/>
      <rect x="-15" y="13" width="3" height="16" fill="#313244"/>
      <rect x="12" y="13" width="3" height="16" fill="#313244"/>
      <!-- Hunched spine -->
      <path d="M0,10 Q8,-4 4,-20" fill="none" stroke="#f47067" stroke-width="3" stroke-linecap="round"/>
      <circle cx="6" cy="-28" r="10" fill="#45475a"/>
    </g>
  </g>
  <text x="190" y="60" fill="#8b949e" font-family="sans-serif" font-size="16">→</text>
  <g transform="translate(230,58)">
    <g>
      <animate attributeName="opacity" values="0;1;1;0;0" dur="4s" repeatCount="indefinite"/>
      <!-- Chair -->
      <rect x="-15" y="10" width="30" height="3" rx="1" fill="#313244"/>
      <rect x="-15" y="13" width="3" height="16" fill="#313244"/>
      <rect x="12" y="13" width="3" height="16" fill="#313244"/>
      <!-- Straight spine -->
      <line x1="0" y1="10" x2="0" y2="-20" stroke="#3fb950" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="-28" r="10" fill="#45475a"/>
      <!-- Checkmark -->
      <text x="16" y="-20" fill="#3fb950" font-family="sans-serif" font-size="14">✓</text>
    </g>
  </g>
  <text x="190" y="96" fill="#8b949e" font-family="sans-serif" font-size="9" text-anchor="middle">Shoulders back · spine tall · ears over shoulders</text>
</svg>