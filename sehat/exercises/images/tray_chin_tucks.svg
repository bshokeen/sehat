<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 110" width="380" height="110">
  <rect width="380" height="110" rx="8" fill="#1e1e2e"/>
  <text x="190" y="16" fill="#f9e2af" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle">🧘 Chin Tucks — #1 for C2-C3</text>
  <g transform="translate(190,60)">
    <!-- Shoulders -->
    <rect x="-30" y="16" width="60" height="14" rx="5" fill="#313244"/>
    <!-- Neck -->
    <rect x="-8" y="-2" width="16" height="22" rx="3" fill="#45475a"/>
    <!-- Head retracts backward (chin tuck) -->
    <circle cx="0" cy="-18" r="16" fill="#45475a">
      <animate attributeName="cx" values="0;-8;-8;0;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-4" cy="-22" r="2" fill="#e6edf3">
      <animate attributeName="cx" values="-4;-12;-12;-4;-4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="4" cy="-22" r="2" fill="#e6edf3">
      <animate attributeName="cx" values="4;-4;-4;4;4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Arrow showing retraction -->
    <g>
      <animate attributeName="opacity" values="0.3;1;1;0.3;0.3" dur="3s" repeatCount="indefinite"/>
      <line x1="20" y1="-18" x2="6" y2="-18" stroke="#89b4fa" stroke-width="2" stroke-linecap="round"/>
      <polygon points="6,-22 -2,-18 6,-14" fill="#89b4fa"/>
    </g>
  </g>
  <text x="190" y="96" fill="#8b949e" font-family="sans-serif" font-size="9" text-anchor="middle">Pull chin straight back · hold 5s · repeat 10×</text>
</svg>