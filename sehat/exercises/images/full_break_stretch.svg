<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160">
  <rect width="240" height="160" rx="12" fill="#161b22"/>
  <!-- Sun -->
  <circle cx="200" cy="30" r="16" fill="#f9e2af" opacity="0.9">
    <animate attributeName="r" values="16;18;16" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- Sun rays -->
  <g opacity="0.4">
    <line x1="200" y1="8" x2="200" y2="2" stroke="#f9e2af" stroke-width="2">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="216" y1="14" x2="222" y2="10" stroke="#f9e2af" stroke-width="2">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" begin="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="222" y1="30" x2="228" y2="30" stroke="#f9e2af" stroke-width="2">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" begin="0.6s" repeatCount="indefinite"/>
    </line>
    <line x1="216" y1="46" x2="222" y2="50" stroke="#f9e2af" stroke-width="2">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" begin="0.9s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Ground -->
  <rect x="0" y="120" width="240" height="40" rx="0" fill="#1a3a1a"/>
  <!-- Path -->
  <rect x="30" y="124" width="210" height="14" rx="7" fill="#2a2a22" opacity="0.6"/>
  <!-- Tree 1 -->
  <rect x="28" y="88" width="6" height="35" rx="2" fill="#5c4a32"/>
  <ellipse cx="31" cy="78" rx="18" ry="14" fill="#2d7a2d">
    <animate attributeName="rx" values="18;19;18" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Tree 2 -->
  <rect x="168" y="85" width="6" height="38" rx="2" fill="#5c4a32"/>
  <ellipse cx="171" cy="75" rx="20" ry="15" fill="#2d7a2d">
    <animate attributeName="rx" values="20;21;20" dur="4s" begin="1s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Person walking -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;80,0;0,0" dur="6s" repeatCount="indefinite"/>
    <!-- Head -->
    <circle cx="75" cy="82" r="10" fill="#484f58"/>
    <circle cx="73" cy="80" r="1.5" fill="#e6edf3"/>
    <circle cx="78" cy="80" r="1.5" fill="#e6edf3"/>
    <!-- Body -->
    <rect x="69" y="92" width="14" height="22" rx="3" fill="#30363d"/>
    <!-- Left leg -->
    <rect x="69" y="112" width="5" height="16" rx="2" fill="#484f58">
      <animate attributeName="height" values="16;12;16" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <!-- Right leg -->
    <rect x="78" y="112" width="5" height="16" rx="2" fill="#484f58">
      <animate attributeName="height" values="12;16;12" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <!-- Left arm -->
    <rect x="64" y="95" width="5" height="14" rx="2" fill="#484f58" transform="rotate(-10,66,95)">
      <animateTransform attributeName="transform" type="rotate" values="-15,66,95;15,66,95;-15,66,95" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <!-- Right arm -->
    <rect x="83" y="95" width="5" height="14" rx="2" fill="#484f58" transform="rotate(10,85,95)">
      <animateTransform attributeName="transform" type="rotate" values="15,85,95;-15,85,95;15,85,95" dur="0.8s" repeatCount="indefinite"/>
    </rect>
  </g>
  <!-- Coffee cup icon -->
  <text x="140" y="108" fill="#8b949e" font-family="sans-serif" font-size="18" opacity="0.6">☕</text>
  <!-- Labels -->
  <text x="120" y="150" fill="#8b949e" font-family="sans-serif" font-size="9" text-anchor="middle">walk · stretch · recharge</text>
  <rect x="85" y="56" rx="10" ry="10" width="70" height="22" fill="#8b949e" opacity="0.15"/>
  <text x="120" y="71" fill="#8b949e" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle">10 min</text>
</svg>
