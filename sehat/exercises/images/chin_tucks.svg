<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160">
  <rect width="240" height="160" rx="12" fill="#161b22"/>
  <!-- Body/shoulders -->
  <rect x="95" y="105" width="50" height="50" rx="6" fill="#30363d"/>
  <!-- Neck -->
  <rect x="110" y="78" width="20" height="32" rx="4" fill="#484f58"/>
  <!-- Head — slides back and forth -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;-14,0;-14,0;0,0;0,0" dur="3s" repeatCount="indefinite"/>
    <circle cx="120" cy="55" r="26" fill="#484f58"/>
    <circle cx="112" cy="50" r="2.5" fill="#e6edf3"/>
    <circle cx="128" cy="50" r="2.5" fill="#e6edf3"/>
    <line x1="115" y1="62" x2="125" y2="62" stroke="#e6edf3" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Arrow pulses with head movement -->
  <g>
    <animate attributeName="opacity" values="0.2;1;1;0.2;0.2" dur="3s" repeatCount="indefinite"/>
    <line x1="78" y1="58" x2="52" y2="58" stroke="#f0883e" stroke-width="3" stroke-linecap="round"/>
    <polygon points="50,52 40,58 50,64" fill="#f0883e"/>
    <text x="38" y="78" fill="#f0883e" font-family="sans-serif" font-size="10" text-anchor="middle">pull back</text>
  </g>
  <!-- Alignment line -->
  <line x1="85" y1="30" x2="85" y2="100" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Rep counter -->
  <rect x="160" y="112" rx="10" ry="10" width="60" height="24" fill="#1f6feb" opacity="0.15"/>
  <text x="190" y="128" fill="#58a6ff" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle">×10 reps</text>
</svg>
