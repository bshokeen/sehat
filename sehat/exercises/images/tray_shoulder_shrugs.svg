<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 110" width="380" height="110">
  <rect width="380" height="110" rx="8" fill="#1e1e2e"/>
  <text x="190" y="16" fill="#f9e2af" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle">💪 Shoulder Shrugs — Release Tension</text>
  <g transform="translate(190,58)">
    <!-- Head -->
    <circle cx="0" cy="-24" r="14" fill="#45475a"/>
    <circle cx="-4" cy="-28" r="2" fill="#e6edf3"/>
    <circle cx="4" cy="-28" r="2" fill="#e6edf3"/>
    <!-- Neck -->
    <rect x="-6" y="-12" width="12" height="14" rx="3" fill="#45475a"/>
    <!-- Shoulders rise and fall -->
    <rect x="-35" y="2" width="25" height="10" rx="4" fill="#89b4fa">
      <animate attributeName="y" values="2;-8;-8;2;2" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="10" y="2" width="25" height="10" rx="4" fill="#89b4fa">
      <animate attributeName="y" values="2;-8;-8;2;2" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <!-- Up arrows -->
    <g>
      <animate attributeName="opacity" values="0.3;1;1;0.3;0.3" dur="2.5s" repeatCount="indefinite"/>
      <polygon points="-22,-6 -18,-14 -14,-6" fill="#bc8cff"/>
      <polygon points="18,-6 22,-14 26,-6" fill="#bc8cff"/>
    </g>
  </g>
  <text x="190" y="96" fill="#8b949e" font-family="sans-serif" font-size="9" text-anchor="middle">Raise shoulders to ears · hold 3s · drop · repeat 10×</text>
</svg>