<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 110" width="380" height="110">
  <rect width="380" height="110" rx="8" fill="#1e1e2e"/>
  <text x="190" y="16" fill="#f9e2af" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle">🧘 Stretch Flow — Full Body</text>
  <!-- Person in forward fold stretch -->
  <g transform="translate(190,60)">
    <!-- Standing leg -->
    <line x1="0" y1="24" x2="0" y2="6" stroke="#bc8cff" stroke-width="3" stroke-linecap="round"/>
    <!-- Torso bending forward -->
    <line x1="0" y1="6" x2="-8" y2="-10" stroke="#bc8cff" stroke-width="3" stroke-linecap="round">
      <animate attributeName="x2" values="-8;-18;-8" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="-10;-2;-10" dur="4s" repeatCount="indefinite"/>
    </line>
    <!-- Head -->
    <circle cx="-10" cy="-18" r="8" fill="#bc8cff">
      <animate attributeName="cx" values="-10;-22;-10" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="-18;-8;-18" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Arms reaching down -->
    <line x1="-6" y1="-4" x2="-12" y2="16" stroke="#bc8cff" stroke-width="2" stroke-linecap="round">
      <animate attributeName="x2" values="-12;-24;-12" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="16;22;16" dur="4s" repeatCount="indefinite"/>
    </line>
    <!-- Floor -->
    <line x1="-40" y1="24" x2="40" y2="24" stroke="#313244" stroke-width="2"/>
    <!-- Breath indicator -->
    <text x="30" y="-8" fill="#8b949e" font-family="sans-serif" font-size="9">
      <animate attributeName="fill" values="#8b949e;#3fb950;#8b949e" dur="4s" repeatCount="indefinite"/>
      breathe
    </text>
  </g>
  <text x="190" y="96" fill="#8b949e" font-family="sans-serif" font-size="9" text-anchor="middle">Hamstrings · hip flexors · shoulders · spine · 10 min flow</text>
</svg>