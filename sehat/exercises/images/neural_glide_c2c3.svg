<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160">
  <rect width="240" height="160" rx="12" fill="#161b22"/>
  <!-- Body/shoulders -->
  <rect x="95" y="100" width="50" height="50" rx="6" fill="#30363d"/>
  <!-- Neck -->
  <rect x="110" y="68" width="20" height="38" rx="4" fill="#484f58"/>
  <!-- Head tilts RIGHT ear toward shoulder — animated -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      values="0 120 55;-20 120 55;-20 120 55;0 120 55;0 120 55" dur="3.5s" repeatCount="indefinite"/>
    <circle cx="120" cy="48" r="24" fill="#484f58"/>
    <circle cx="112" cy="44" r="2.5" fill="#e6edf3"/>
    <circle cx="128" cy="44" r="2.5" fill="#e6edf3"/>
  </g>
  <!-- Right arm extends outward during glide -->
  <line x1="145" y1="108" y2="104" stroke="#89b4fa" stroke-width="4" stroke-linecap="round">
    <animate attributeName="x2" values="155;200;200;155;155" dur="3.5s" repeatCount="indefinite"/>
  </line>
  <!-- Hand with fingers spread -->
  <g>
    <animate attributeName="opacity" values="0.4;1;1;0.4;0.4" dur="3.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate"
      values="0,0;45,0;45,0;0,0;0,0" dur="3.5s" repeatCount="indefinite"/>
    <circle cx="158" cy="102" r="5" fill="#89b4fa"/>
    <line x1="163" y1="98" x2="170" y2="94" stroke="#89b4fa" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="163" y1="102" x2="171" y2="101" stroke="#89b4fa" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="163" y1="106" x2="170" y2="110" stroke="#89b4fa" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Tilt arrow -->
  <g>
    <animate attributeName="opacity" values="0.3;1;1;0.3;0.3" dur="3.5s" repeatCount="indefinite"/>
    <path d="M148 30 Q168 38 158 56" fill="none" stroke="#bc8cff" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="156,58 162,56 158,64" fill="#bc8cff"/>
  </g>
  <!-- Labels -->
  <text x="42" y="50" fill="#8b949e" font-family="sans-serif" font-size="10" text-anchor="middle">tilt right →</text>
  <text x="42" y="110" fill="#89b4fa" font-family="sans-serif" font-size="10" text-anchor="middle">extend arm →</text>
  <!-- Rep counter -->
  <rect x="160" y="130" rx="10" ry="10" width="68" height="22" fill="#bc8cff" opacity="0.15"/>
  <text x="194" y="145" fill="#bc8cff" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle">×5 slow reps</text>
</svg>
