<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 110" width="380" height="110">
  <rect width="380" height="110" rx="8" fill="#1e1e2e"/>
  <text x="190" y="16" fill="#f9e2af" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle">💧 Drink Water — Stay Hydrated</text>
  <g transform="translate(190,58)">
    <!-- Glass -->
    <path d="M-12,20 L-16,-14 L16,-14 L12,20 Z" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Water level rises -->
    <clipPath id="glass-clip">
      <path d="M-12,20 L-16,-14 L16,-14 L12,20 Z"/>
    </clipPath>
    <rect x="-16" y="20" width="32" height="34" fill="#58a6ff" opacity="0.4" clip-path="url(#glass-clip)">
      <animate attributeName="y" values="20;-14;-14;20;20" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <!-- Droplet above -->
    <g>
      <animate attributeName="opacity" values="1;0;0;1;1" dur="3.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,-30;0,-14;0,-14;0,-30;0,-30" dur="3.5s" repeatCount="indefinite"/>
      <path d="M0,-6 Q-5,2 0,6 Q5,2 0,-6 Z" fill="#58a6ff"/>
    </g>
  </g>
  <text x="190" y="96" fill="#8b949e" font-family="sans-serif" font-size="9" text-anchor="middle">Take a sip · stay hydrated · aim for 8 glasses/day</text>
</svg>