<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160">
  <rect width="240" height="160" rx="12" fill="#161b22"/>
  <!-- Body -->
  <rect x="95" y="95" width="50" height="55" rx="6" fill="#30363d"/>
  <!-- Neck -->
  <rect x="110" y="70" width="20" height="30" rx="4" fill="#484f58"/>
  <!-- Head -->
  <circle cx="120" cy="50" r="22" fill="#484f58"/>
  <circle cx="113" cy="46" r="2" fill="#e6edf3"/>
  <circle cx="127" cy="46" r="2" fill="#e6edf3"/>
  <path d="M 114 57 Q 120 62 126 57" stroke="#e6edf3" stroke-width="1.5" fill="none"/>
  <!-- Left shoulder — bounces up -->
  <ellipse cx="80" cy="100" rx="22" ry="12" fill="#484f58">
    <animate attributeName="cy" values="100;84;84;100;100" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Right shoulder — bounces up (slightly delayed via different timing) -->
  <ellipse cx="160" cy="100" rx="22" ry="12" fill="#484f58">
    <animate attributeName="cy" values="100;100;84;84;100" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Up arrows — pulse with shoulders -->
  <polygon points="45,85 50,68 55,85" fill="#f0883e">
    <animate attributeName="opacity" values="0.2;0.9;0.9;0.2;0.2" dur="2.5s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="185,85 190,68 195,85" fill="#f0883e">
    <animate attributeName="opacity" values="0.2;0.2;0.9;0.9;0.2" dur="2.5s" repeatCount="indefinite"/>
  </polygon>
  <!-- Labels -->
  <text x="50" y="60" fill="#f0883e" font-family="sans-serif" font-size="10" text-anchor="middle">lift ↑</text>
  <text x="190" y="60" fill="#f0883e" font-family="sans-serif" font-size="10" text-anchor="middle">lift ↑</text>
  <!-- Hold label -->
  <rect x="85" y="130" rx="10" ry="10" width="70" height="24" fill="#1f6feb" opacity="0.15"/>
  <text x="120" y="146" fill="#58a6ff" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle">hold 5s</text>
</svg>
