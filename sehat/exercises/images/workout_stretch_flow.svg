<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160">
  <rect width="240" height="160" rx="12" fill="#161b22"/>
  <!-- Floor -->
  <line x1="20" y1="132" x2="220" y2="132" stroke="#30363d" stroke-width="2"/>
  <!-- Person doing side bend -->
  <g transform="translate(60, 0)">
    <!-- Head -->
    <circle cx="0" cy="38" r="10" fill="#484f58">
      <animate attributeName="cx" values="0;14;0;-14;0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="38;44;38;44;38" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Torso — tilts side to side -->
    <line x1="0" y1="48" x2="0" y2="85" stroke="#484f58" stroke-width="6" stroke-linecap="round">
      <animate attributeName="x1" values="0;14;0;-14;0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="48;54;48;54;48" dur="4s" repeatCount="indefinite"/>
    </line>
    <!-- Left arm — stretches overhead during right bend -->
    <line x1="0" y1="58" x2="-20" y2="42" stroke="#89b4fa" stroke-width="3" stroke-linecap="round">
      <animate attributeName="x1" values="0;14;0;-14;0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-20;30;-20;-30;-20" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="42;30;42;48;42" dur="4s" repeatCount="indefinite"/>
    </line>
    <!-- Right arm -->
    <line x1="0" y1="58" x2="20" y2="72" stroke="#484f58" stroke-width="3" stroke-linecap="round">
      <animate attributeName="x1" values="0;14;0;-14;0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="20;24;20;-10;20" dur="4s" repeatCount="indefinite"/>
    </line>
    <!-- Legs -->
    <line x1="-8" y1="85" x2="-8" y2="130" stroke="#484f58" stroke-width="5" stroke-linecap="round"/>
    <line x1="8" y1="85" x2="8" y2="130" stroke="#484f58" stroke-width="5" stroke-linecap="round"/>
    <!-- Motion arcs -->
    <path d="M -20,25 Q 0,15 20,25" fill="none" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- Person doing forward fold -->
  <g transform="translate(170, 0)">
    <!-- Legs -->
    <line x1="-8" y1="85" x2="-8" y2="130" stroke="#484f58" stroke-width="5" stroke-linecap="round"/>
    <line x1="8" y1="85" x2="8" y2="130" stroke="#484f58" stroke-width="5" stroke-linecap="round"/>
    <!-- Torso — bends forward and back -->
    <line x1="0" y1="85" x2="0" y2="48" stroke="#484f58" stroke-width="6" stroke-linecap="round">
      <animate attributeName="x2" values="0;20;0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="48;75;48" dur="3s" repeatCount="indefinite"/>
    </line>
    <!-- Head -->
    <circle cx="0" cy="40" r="10" fill="#484f58">
      <animate attributeName="cx" values="0;22;0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="40;68;40" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Arms hanging -->
    <line x1="0" y1="58" x2="-5" y2="72" stroke="#484f58" stroke-width="3" stroke-linecap="round">
      <animate attributeName="x1" values="0;16;0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="58;76;58" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-5;14;-5" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="72;100;72" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="58" x2="5" y2="72" stroke="#484f58" stroke-width="3" stroke-linecap="round">
      <animate attributeName="x1" values="0;16;0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="58;76;58" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="5;20;5" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="72;100;72" dur="3s" repeatCount="indefinite"/>
    </line>
    <!-- Motion arc -->
    <path d="M -15,38 Q 10,20 30,50" fill="none" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- Labels -->
  <text x="60" y="148" fill="#89b4fa" font-family="sans-serif" font-size="9" text-anchor="middle">side bend</text>
  <text x="170" y="148" fill="#89b4fa" font-family="sans-serif" font-size="9" text-anchor="middle">forward fold</text>
  <!-- Badge -->
  <rect x="85" y="4" rx="10" ry="10" width="70" height="22" fill="#89b4fa" opacity="0.15"/>
  <text x="120" y="19" fill="#89b4fa" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle">10 min</text>
  <!-- Zen circle -->
  <circle cx="120" cy="80" r="22" fill="none" stroke="#89b4fa" stroke-width="1" opacity="0.15">
    <animate attributeName="r" values="22;26;22" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.05;0.15" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>
