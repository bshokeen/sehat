<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160">
  <rect width="240" height="160" rx="12" fill="#161b22"/>
  <!-- Eye white -->
  <ellipse cx="80" cy="68" rx="38" ry="22" fill="#0d1117" stroke="#e6edf3" stroke-width="2.5">
    <animate attributeName="ry" values="22;22;3;3;22;22" dur="3.5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Iris — slides left/right -->
  <circle cx="80" cy="68" r="14" fill="#1f6feb">
    <animate attributeName="cx" values="80;80;95;95;80;80" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Pupil -->
  <circle cx="80" cy="68" r="6" fill="#0d1117">
    <animate attributeName="cx" values="80;80;95;95;80;80" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Dashed line to target -->
  <line x1="118" y1="66" x2="180" y2="50" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="5,4">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" repeatCount="indefinite"/>
  </line>
  <!-- Target pulsing -->
  <circle cx="195" cy="44" r="12" fill="#3fb950" opacity="0.2">
    <animate attributeName="r" values="12;20;12" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.5;0.15" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="195" cy="44" r="8" fill="#238636"/>
  <!-- Labels -->
  <text x="195" y="70" fill="#8b949e" font-family="sans-serif" font-size="10" text-anchor="middle">20 ft</text>
  <rect x="55" y="112" rx="10" ry="10" width="54" height="24" fill="#1f6feb" opacity="0.15"/>
  <text x="82" y="128" fill="#58a6ff" font-family="sans-serif" font-size="12" font-weight="600" text-anchor="middle">20 sec</text>
  <rect x="128" y="112" rx="10" ry="10" width="68" height="24" fill="#3fb950" opacity="0.15"/>
  <text x="162" y="128" fill="#3fb950" font-family="sans-serif" font-size="10" font-weight="500" text-anchor="middle">every 20 min</text>
</svg>
