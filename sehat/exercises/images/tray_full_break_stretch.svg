<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 110" width="380" height="110">
  <rect width="380" height="110" rx="8" fill="#1e1e2e"/>
  <text x="190" y="16" fill="#f9e2af" font-family="sans-serif" font-size="10" font-weight="600" text-anchor="middle">☕ Full Break — Step Away &amp; Stretch</text>
  <!-- Coffee cup -->
  <g transform="translate(130,54)">
    <rect x="-10" y="-6" width="20" height="18" rx="3" fill="#45475a" stroke="#8b949e" stroke-width="1.5"/>
    <path d="M10,0 Q18,0 18,6 Q18,12 10,12" fill="none" stroke="#8b949e" stroke-width="1.5"/>
    <!-- Steam -->
    <path d="M-4,-10 Q-6,-18 -2,-24" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M4,-10 Q6,-18 2,-24" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-linecap="round">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- Stretching person -->
  <g transform="translate(250,54)">
    <circle cx="0" cy="-20" r="8" fill="#f0883e"/>
    <line x1="0" y1="-12" x2="0" y2="10" stroke="#f0883e" stroke-width="3" stroke-linecap="round"/>
    <!-- Arms up stretching -->
    <line x1="0" y1="-6" x2="-14" y2="-24" stroke="#f0883e" stroke-width="2" stroke-linecap="round">
      <animate attributeName="x2" values="-14;-16;-14" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="-24;-28;-24" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="-6" x2="14" y2="-24" stroke="#f0883e" stroke-width="2" stroke-linecap="round">
      <animate attributeName="x2" values="14;16;14" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="-24;-28;-24" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="10" x2="-8" y2="26" stroke="#f0883e" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="10" x2="8" y2="26" stroke="#f0883e" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="190" y="96" fill="#8b949e" font-family="sans-serif" font-size="9" text-anchor="middle">5-10 min break · stretch · walk · rest your eyes</text>
</svg>