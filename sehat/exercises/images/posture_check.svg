<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160">
  <rect width="240" height="160" rx="12" fill="#161b22"/>
  <!-- BAD posture (left) — head bobs forward -->
  <rect x="50" y="100" width="30" height="40" rx="4" fill="#30363d"/>
  <rect x="57" y="70" width="16" height="35" rx="3" fill="#484f58"/>
  <circle cx="65" cy="52" r="18" fill="#484f58">
    <animate attributeName="cx" values="65;75;75;65;65" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="52;58;58;52;52" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="48" r="2" fill="#e6edf3">
    <animate attributeName="cx" values="60;70;70;60;60" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="48" r="2" fill="#e6edf3">
    <animate attributeName="cx" values="70;80;80;70;70" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- X mark fades in/out -->
  <text x="65" y="28" fill="#f85149" font-family="sans-serif" font-size="22" font-weight="bold" text-anchor="middle">✗
    <animate attributeName="opacity" values="0.8;0.8;0;0" dur="4s" repeatCount="indefinite"/>
  </text>
  <!-- Arrow between -->
  <text x="120" y="85" fill="#58a6ff" font-family="sans-serif" font-size="24" text-anchor="middle">→
    <animate attributeName="opacity" values="0.3;0.3;1;1" dur="4s" repeatCount="indefinite"/>
  </text>
  <!-- GOOD posture (right) — upright figure -->
  <rect x="160" y="100" width="30" height="40" rx="4" fill="#30363d"/>
  <rect x="167" y="70" width="16" height="35" rx="3" fill="#484f58"/>
  <circle cx="175" cy="52" r="18" fill="#484f58"/>
  <circle cx="170" cy="48" r="2" fill="#e6edf3"/>
  <circle cx="180" cy="48" r="2" fill="#e6edf3"/>
  <!-- Check mark fades in -->
  <text x="175" y="28" fill="#3fb950" font-family="sans-serif" font-size="22" font-weight="bold" text-anchor="middle">✓
    <animate attributeName="opacity" values="0;0;0.9;0.9" dur="4s" repeatCount="indefinite"/>
  </text>
  <!-- Glow behind good posture -->
  <circle cx="175" cy="80" r="30" fill="#3fb950" opacity="0">
    <animate attributeName="opacity" values="0;0;0.12;0.12" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- Labels -->
  <text x="65" y="152" fill="#f85149" font-family="sans-serif" font-size="9" text-anchor="middle">slouched</text>
  <text x="175" y="152" fill="#3fb950" font-family="sans-serif" font-size="9" text-anchor="middle">upright</text>
</svg>
